name = "starry-ledger-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"
routes = [
  { pattern = "ledger-api.tychen.cc", custom_domain = true }
]

[vars]
ENVIRONMENT = "production"
APP_ORIGIN = "https://ledger.tychen.cc"
SESSION_COOKIE_NAME = "starry_session"
MONITOR_SAMPLE_RATE = "1"
MIMO_BASE_URL = "https://token-plan-sgp.xiaomimimo.com/v1"
MIMO_MODEL = "mimo-v2.5"

[[d1_databases]]
binding = "DB"
database_name = "starry-ledger"
database_id = "1175e8db-8df6-4ab8-a028-1fd131b6aa4f"
migrations_dir = "../../database/d1"
